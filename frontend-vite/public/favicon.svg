<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF6347"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c7cfa"/>
      <stop offset="100%" style="stop-color:#748ffc"/>
    </linearGradient>
  </defs>
  <!-- Sun -->
  <circle cx="50" cy="50" r="28" fill="url(#sunGrad)"/>
  <!-- Sun glow -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="url(#sunGrad)" stroke-width="1" opacity="0.4"/>
  <!-- Orbit ring -->
  <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.6" transform="rotate(-15 50 50)"/>
  <!-- Planet on orbit -->
  <circle cx="85" cy="42" r="5" fill="#5c7cfa" opacity="0.9"/>
  <circle cx="85" cy="42" r="7" fill="none" stroke="#5c7cfa" stroke-width="0.8" opacity="0.4"/>
  <!-- Letter A -->
  <text x="50" y="57" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-1">A</text>
</svg>
